<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>position relative</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }
        #con{
            width: 3000px;
            height:300px;
            background-color: aqua;
            margin: 0px auto;
            position: relative;
        }
        .box{
            width:50px;
            height:50px;
            background-color: black;
            color: white;
            margin:1px;
            display: inline-block;
        }
        
        #box2{
            position:absolute;
            z-index: 4;
        }
        #box3{
            position: relative;
            z-index: 2;
        }


    </style>
</head>
<body>
    <h1 style="text-align:center">postion absolute</h1>
    <div class="con">
        <div class="box" id="box1">i am box 1</div>
        <div class="box" id="box2">i am box 2</div>
        <div class="box" id="box3">i am box 3</div>
        <div class="box" id="box4">i am box 4</div>
    </div>
</body>
</html>
