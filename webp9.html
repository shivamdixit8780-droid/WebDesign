<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>postion relative</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .con
        {
            height: 30px;
            background-color: aqua;
            width:600px;
            margin: 0px auto;
        }
        .box
        {
            width:50px;
            height: 50px;
            background-color: black;
            color: white;
            position:relative;
            top:15px;
            left:50px;
        }

    </style>
</head>
<body>
    <h1 style="text-align: center;">position relative</h1>

    <div class="con">
        <div class="box">i am box</div>

    </div>
</body>
</html>
